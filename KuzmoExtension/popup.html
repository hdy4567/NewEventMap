<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 250px; font-family: 'Inter', sans-serif; padding: 15px; background: #121212; color: white; }
    h2 { font-size: 16px; color: #00bcd4; margin-top: 0; }
    .status { font-size: 12px; margin-bottom: 10px; opacity: 0.8; }
    .btn { 
      background: #00bcd4; color: black; border: none; width: 100%; padding: 10px;
      border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    .btn:hover { background: #00e5ff; }
  </style>
</head>
<body>
  <h2>💎 Kuzmo Bridge v1.0</h2>
  <div class="status">AI 드래그/붙여넣기 보정 활성됨</div>
  <button class="btn" id="checkServer">서버 연결 확인</button>
  <script>
    document.getElementById('checkServer').onclick = async () => {
      try {
        const res = await fetch('http://localhost:9091/api/sync/status');
        const data = await res.json();
        alert('서버 연결 상태: ' + (data.status || '대기 중'));
      } catch (e) { alert('서버가 꺼져 있습니다 (9091)!'); }
    };
  </script>
</body>
</html>
